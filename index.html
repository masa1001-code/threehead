<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThreeHead.co | Premium Apparel</title>
    <!-- Framework CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Icon Library -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #333333;
        }

        .bg-light-gray { background-color: #f5f5f5; }
        .bg-medium-gray { background-color: #e5e5e5; }
        .text-medium-gray { color: #666666; }

        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
        
        .cart-item-enter {
            animation: slideLeft 0.3s ease-out;
        }
        @keyframes slideLeft {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Toast Notification Animation */
        #toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* Responsive Modal Fix */
        .modal-scroll-container {
            max-height: 90vh;
            overflow-y: auto;
            scrollbar-width: thin;
        }

        /* Image Slider Transitions */
        .slider-img {
            transition: opacity 0.3s ease-in-out;
        }
    </style>
</head>
<body class="overflow-x-hidden">

    <!-- [NAVBAR] -->
    <nav class="w-full py-6 flex justify-center border-b border-gray-100 sticky top-0 bg-white/80 backdrop-blur-md z-50">
        <div class="flex items-center gap-3 cursor-pointer" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
            <div class="w-10 h-10 flex items-center justify-center overflow-hidden rounded-full border border-gray-100 bg-light-gray shadow-sm">
                <img src="https://ik.imagekit.io/kmeznn0g9/logo%201.jpg" 
                     alt="Logo Toko" 
                     class="w-full h-full object-cover"
                     onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                <span class="hidden font-bold text-sm text-black">TH</span>
            </div>
            <span class="text-xl font-bold tracking-tighter uppercase">ThreeHead.co</span>
        </div>
    </nav>

    <!-- [HERO] -->
    <section class="max-w-7xl mx-auto px-6 py-16 text-center">
        <h1 class="text-5xl font-light mb-4 tracking-tight">Koleksi Fashion Premium</h1>
        <p class="text-medium-gray max-w-xl mx-auto text-lg">Produk fashion premium dengan desain minimalis untuk gaya hidup modern Anda.</p>
    </section>

    <!-- [FILTER] -->
    <div class="max-w-7xl mx-auto px-6 mb-12 flex flex-wrap justify-center gap-3">
        <button onclick="filterCategory('semua')" class="px-6 py-2 rounded-full border border-gray-200 hover:bg-black hover:text-white transition-all text-sm font-medium">Semua</button>
        <button onclick="filterCategory('topi')" class="px-6 py-2 rounded-full border border-gray-200 hover:bg-black hover:text-white transition-all text-sm font-medium">Topi</button>
        <button onclick="filterCategory('shirt')" class="px-6 py-2 rounded-full border border-gray-200 hover:bg-black hover:text-white transition-all text-sm font-medium">Baju</button>
        <button onclick="filterCategory('celana')" class="px-6 py-2 rounded-full border border-gray-200 hover:bg-black hover:text-white transition-all text-sm font-medium">Celana</button>
        <button onclick="filterCategory('tas')" class="px-6 py-2 rounded-full border border-gray-200 hover:bg-black hover:text-white transition-all text-sm font-medium">Tas</button>
        <button onclick="filterCategory('sepatu')" class="px-6 py-2 rounded-full border border-gray-200 hover:bg-black hover:text-white transition-all text-sm font-medium">Sepatu</button>
    </div>

    <!-- [PRODUCT GRID] -->
    <main class="max-w-7xl mx-auto px-6 pb-24 min-h-[400px]">
        <div id="product-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- JavaScript Injected Content -->
        </div>
    </main>

    <!-- [MODAL] -->
    <div id="product-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] hidden items-center justify-center p-4" onclick="closeModalOutside(event)">
        <div class="bg-white max-w-4xl w-full rounded-3xl shadow-2xl flex flex-col md:flex-row relative animate-in fade-in zoom-in duration-300 modal-scroll-container">
            
            <button onclick="closeModal()" class="absolute top-4 right-4 z-30 p-2 bg-white/80 hover:bg-white rounded-full shadow-sm transition-colors">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
            
            <!-- [MODAL IMAGE SLIDER] -->
            <div class="w-full md:w-1/2 bg-zinc-50 flex items-center justify-center p-6 md:p-8 min-h-[300px] relative group overflow-hidden">
                <!-- Navigation Arrows -->
                <div id="slider-nav" class="absolute inset-0 flex items-center justify-between px-2 z-10 pointer-events-none opacity-0 group-hover:opacity-100 transition-opacity">
                    <button onclick="prevImage()" class="p-2 bg-white/90 rounded-full shadow-md pointer-events-auto hover:bg-white active:scale-90 transition-all">
                        <i data-lucide="chevron-left" class="w-5 h-5"></i>
                    </button>
                    <button onclick="nextImage()" class="p-2 bg-white/90 rounded-full shadow-md pointer-events-auto hover:bg-white active:scale-90 transition-all">
                        <i data-lucide="chevron-right" class="w-5 h-5"></i>
                    </button>
                </div>

                <!-- Main Image Container -->
                <div id="modal-image-display" class="w-full h-full flex items-center justify-center">
                    <!-- Image Injected here -->
                </div>

                <!-- Image Dots -->
                <div id="slider-dots" class="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-1.5 z-10">
                    <!-- Dots Injected -->
                </div>
            </div>
            
            <div class="w-full md:w-1/2 p-6 md:p-10 flex flex-col justify-between bg-white">
                <div>
                    <div class="flex justify-between items-start">
                        <span id="modal-category" class="text-[10px] uppercase tracking-[0.2em] text-zinc-400 font-bold">Kategori</span>
                        <span id="modal-stock-badge" class="text-[10px] px-2 py-0.5 rounded-full font-bold uppercase tracking-wider">Stok: 0</span>
                    </div>
                    <h2 id="modal-title" class="text-2xl md:text-3xl font-bold mt-2 mb-4 text-zinc-900 leading-tight">Nama Produk</h2>
                    <p id="modal-description" class="text-zinc-500 mb-6 md:mb-8 leading-relaxed text-sm">Deskripsi...</p>
                    <div class="text-2xl md:text-3xl font-semibold mb-6 text-zinc-900" id="modal-price">Rp 0</div>
                    
                    <!-- [MODAL QUANTITY CONTROL] -->
                    <div class="flex items-center gap-4 mb-8" id="modal-qty-section">
                        <span class="text-sm font-medium text-zinc-500">Jumlah:</span>
                        <div class="flex items-center gap-4 bg-zinc-100 px-4 py-2 rounded-xl">
                            <button onclick="updateModalQty(-1)" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-white transition-all shadow-sm active:scale-90">
                                <i data-lucide="minus" class="w-4 h-4"></i>
                            </button>
                            <span id="modal-qty" class="text-lg font-bold w-6 text-center">1</span>
                            <button onclick="updateModalQty(1)" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-white transition-all shadow-sm active:scale-90">
                                <i data-lucide="plus" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                </div>
                <div id="modal-action-container">
                    <button id="modal-add-btn" onclick="addToCartFromModal()" class="w-full bg-black text-white py-4 md:py-5 rounded-2xl font-bold hover:bg-zinc-800 active:scale-[0.98] transition-all flex items-center justify-center gap-3 disabled:bg-zinc-300 disabled:cursor-not-allowed">
                        <i data-lucide="plus-circle" class="w-5 h-5"></i> Tambahkan ke Keranjang
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- [CART DRAWER] -->
    <div id="cart-drawer" class="fixed bottom-8 right-8 z-50">
        <button onclick="toggleCart()" class="bg-black text-white p-5 rounded-full shadow-2xl relative hover:scale-110 active:scale-90 transition-all">
            <i data-lucide="shopping-bag" class="w-6 h-6"></i>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-[10px] w-6 h-6 flex items-center justify-center rounded-full border-2 border-white font-bold">0</span>
        </button>
        
        <div id="cart-content" class="absolute bottom-20 right-0 w-80 sm:w-96 bg-white rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.15)] border border-gray-100 p-6 hidden flex flex-col">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-xl font-bold text-zinc-900">Pesanan Anda</h3>
                <span class="text-xs bg-zinc-100 px-2 py-1 rounded text-zinc-500 font-medium">Instan Checkout</span>
            </div>
            
            <div id="cart-items" class="max-h-[400px] overflow-y-auto mb-6 pr-2 space-y-4">
                <!-- Cart Items Injected -->
            </div>
            
            <div class="border-t pt-6">
                <div class="flex justify-between items-center mb-6">
                    <span class="font-medium text-zinc-400">Total Harga</span>
                    <span id="cart-total" class="font-black text-2xl text-zinc-900">Rp 0</span>
                </div>
                <button onclick="checkoutWhatsApp()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold hover:bg-green-700 active:scale-95 transition-all flex items-center justify-center gap-3 shadow-lg shadow-green-200">
                    <i data-lucide="message-circle" class="w-5 h-5"></i> Pesan via WhatsApp
                </button>
            </div>
        </div>
    </div>

    <!-- [CUSTOM TOAST NOTIFICATION] -->
    <div id="toast" class="fixed top-8 left-1/2 -translate-x-1/2 z-[200] bg-zinc-900 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 opacity-0 translate-y-[-20px] transition-all duration-300 pointer-events-none">
        <i data-lucide="info" class="w-5 h-5 text-yellow-400" id="toast-icon"></i>
        <span id="toast-message" class="font-bold text-sm tracking-wide">Pesan di sini</span>
    </div>

    <footer class="bg-zinc-50 py-16 text-center text-sm text-zinc-400 border-t border-zinc-100">
        <p class="font-bold text-zinc-900 mb-2 uppercase tracking-widest">ThreeHead.co</p>
        <p>&copy; 2026 - Koleksi Fashion Premium Minimalis</p>
    </footer>

    <script>
        // DATA PRODUK
        const products = [
            { id: 1, name: "Premium Dad Hat", category: "topi", price: 150000, stock: -1, description: "Topi dengan material katun twill berkualitas tinggi dan strap yang bisa disesuaikan.", images: ["https://images.unsplash.com/photo-1588850561407-ed78c282e89b?w=400"] },
            { id: 2, name: "New Arrivals | Premium", category: "shirt", price: 99000, stock: 12, description: "Kaos potongan oversized dengan bahan katun 24s yang tebal namun tetap adem.", images: ["https://ik.imagekit.io/kmeznn0g9/44.jpg","https://ik.imagekit.io/kmeznn0g9/01.jpg" ] },
            { id: 3, name: "Minimalist Windbreaker", category: "shirt", price: 550000, stock: -1, description: "Jaket tahan angin dengan desain ramping dan material water-repellent.", images: ["https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=400"] },
            { id: 4, name: "Arsip Produk (Hidden)", category: "shirt", price: 0, stock: -1, description: "Ini tidak akan muncul.", images: [""] },
            { id: 5, name: "Produk Non-Aktif (Hidden)", category: "shirt", price: 0, stock: -1, description: "Ini tidak akan muncul juga.", images: [""] },
            { id: 6, name: "Relaxed Chino Pants", category: "celana", price: 450000, stock: -1, description: "Celana chino dengan potongan rileks.", images: ["https://images.unsplash.com/photo-1473966968600-fa801b869a1a?w=400"] },
            { id: 7, name: "Canvas Daily Tote", category: "tas", price: 120000, stock: -1, description: "Tas kanvas kuat.", images: ["https://images.unsplash.com/photo-1544816153-155f308df8b1?w=400"] },
            { id: 8, name: "Classic White Sneakers", category: "sepatu", price: 850000, stock: -1, description: "Sepatu kulit putih klasik.", images: ["https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a?w=400"] }
        ];

        let cart = [];
        let activeModalProduct = null;
        let activeImageIndex = 0;
        let modalQty = 1;
        
        // Touch Variables for Swiping
        let touchStartX = 0;
        let touchEndX = 0;

        function formatRupiah(number) {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(number);
        }

        function showToast(msg, iconName = 'info') {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-message');
            const toastIcon = document.getElementById('toast-icon');
            toastMsg.textContent = msg;
            toastIcon.setAttribute('data-lucide', iconName);
            lucide.createIcons();
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        function renderProducts(filter = 'semua') {
            const container = document.getElementById('product-container');
            container.innerHTML = '';
            
            const activeProducts = products.filter(p => p.stock !== -1 && p.stock !== "!");
            const filtered = filter === 'semua' 
                ? activeProducts 
                : activeProducts.filter(p => p.category === filter);
            
            if (filtered.length === 0) {
                container.className = "flex flex-col items-center justify-center col-span-full py-20 fade-in";
                container.innerHTML = `
                    <div class="bg-zinc-50 p-12 rounded-[3rem] border border-dashed border-zinc-200 text-center w-full max-w-lg">
                        <i data-lucide="package-search" class="w-16 h-16 mx-auto mb-6 text-zinc-300"></i>
                        <h2 class="text-3xl font-bold text-zinc-900 mb-2 italic">Coming Soon</h2>
                        <p class="text-zinc-500">Koleksi baru untuk kategori ini sedang dalam tahap kurasi.</p>
                        <button onclick="filterCategory('semua')" class="mt-8 text-sm font-bold underline underline-offset-4 hover:text-black transition-colors">Lihat Koleksi Lainnya</button>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            container.className = "grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8";
            filtered.forEach(p => {
                const isOutOfStock = p.stock === 0;
                const card = document.createElement('div');
                card.className = "bg-white rounded-[2rem] p-4 flex flex-col border border-zinc-100 hover:shadow-2xl transition-all duration-500 group fade-in";
                card.innerHTML = `
                    <div class="relative w-full aspect-square rounded-[1.5rem] overflow-hidden mb-6 bg-zinc-50 cursor-pointer" onclick="openModal(${p.id})">
                        <img id="img-${p.id}" src="${p.images[0]}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110 ${isOutOfStock ? 'grayscale' : ''}" alt="${p.name}">
                        <div class="absolute inset-0 bg-black/0 group-hover:bg-black/10 transition-colors flex items-center justify-center">
                            <span class="bg-white text-black px-4 py-2 rounded-full text-xs font-bold opacity-0 group-hover:opacity-100 transition-all transform translate-y-4 group-hover:translate-y-0 shadow-lg uppercase tracking-widest">Detail Cepat</span>
                        </div>
                        ${isOutOfStock ? '<div class="absolute top-4 left-4 bg-red-500 text-white text-[10px] font-bold px-3 py-1 rounded-full">HABIS</div>' : ''}
                    </div>
                    <div class="px-2 pb-2">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <span class="text-[9px] uppercase tracking-widest text-zinc-400 font-bold mb-1 block">${p.category}</span>
                                <h3 class="text-lg font-bold text-zinc-900">${p.name}</h3>
                            </div>
                        </div>
                        <p class="text-zinc-900 font-black text-xl mb-6">${formatRupiah(p.price)}</p>
                        <button ${isOutOfStock ? 'disabled' : `onclick="changeQuantity(${p.id}, 1)"`} class="w-full py-4 ${isOutOfStock ? 'bg-zinc-200 text-zinc-400 cursor-not-allowed' : 'bg-zinc-900 text-white hover:bg-black active:scale-95'} rounded-2xl text-xs font-bold transition-all uppercase tracking-widest">
                            ${isOutOfStock ? 'Stok Habis' : 'Tambah ke Keranjang'}
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
            lucide.createIcons();
        }

        function filterCategory(cat) { renderProducts(cat); }

        function openModal(id) {
            const product = products.find(p => p.id === id);
            if (!product) return;
            
            activeModalProduct = product;
            modalQty = 1;
            activeImageIndex = 0;
            
            const isOutOfStock = product.stock === 0;
            const stockBadge = document.getElementById('modal-stock-badge');
            const qtySection = document.getElementById('modal-qty-section');
            const addBtn = document.getElementById('modal-add-btn');

            document.getElementById('modal-qty').textContent = modalQty;
            document.getElementById('modal-title').textContent = product.name;
            document.getElementById('modal-category').textContent = product.category;
            document.getElementById('modal-price').textContent = formatRupiah(product.price);
            document.getElementById('modal-description').textContent = product.description;
            
            updateSliderUI();
            
            stockBadge.textContent = isOutOfStock ? "STOK HABIS" : `STOK: ${product.stock}`;
            stockBadge.className = `text-[10px] px-2 py-0.5 rounded-full font-bold uppercase tracking-wider ${isOutOfStock ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}`;
            
            if (isOutOfStock) {
                qtySection.classList.add('hidden');
                addBtn.disabled = true;
                addBtn.innerHTML = `Stok Habis`;
            } else {
                qtySection.classList.remove('hidden');
                addBtn.disabled = false;
                addBtn.innerHTML = `<i data-lucide="plus-circle" class="w-5 h-5"></i> Tambahkan ke Keranjang`;
            }

            const modal = document.getElementById('product-modal');
            modal.classList.remove('hidden'); modal.classList.add('flex');
            document.body.style.overflow = 'hidden';
            lucide.createIcons();

            // Set up Swipe Listeners
            const sliderArea = document.getElementById('modal-image-display').parentElement;
            sliderArea.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; }, {passive: true});
            sliderArea.addEventListener('touchend', (e) => { 
                touchEndX = e.changedTouches[0].screenX;
                handleSwipe();
            }, {passive: true});
        }

        // SLIDER LOGIC
        function updateSliderUI() {
            if (!activeModalProduct) return;
            const display = document.getElementById('modal-image-display');
            const dots = document.getElementById('slider-dots');
            const nav = document.getElementById('slider-nav');
            const isOutOfStock = activeModalProduct.stock === 0;

            // Show/Hide Nav Arrows if images > 1
            if (activeModalProduct.images.length > 1) {
                nav.classList.remove('hidden');
            } else {
                nav.classList.add('hidden');
            }

            // Update Image
            display.innerHTML = `
                <img src="${activeModalProduct.images[activeImageIndex]}" 
                     class="max-h-72 md:max-h-[400px] object-contain rounded-xl shadow-lg slider-img ${isOutOfStock ? 'grayscale' : ''}">
            `;

            // Update Dots
            dots.innerHTML = '';
            if (activeModalProduct.images.length > 1) {
                activeModalProduct.images.forEach((_, idx) => {
                    const dot = document.createElement('div');
                    dot.className = `w-2 h-2 rounded-full transition-all ${idx === activeImageIndex ? 'bg-black w-4' : 'bg-zinc-300'}`;
                    dots.appendChild(dot);
                });
            }
        }

        function nextImage() {
            if (!activeModalProduct) return;
            activeImageIndex = (activeImageIndex + 1) % activeModalProduct.images.length;
            updateSliderUI();
        }

        function prevImage() {
            if (!activeModalProduct) return;
            activeImageIndex = (activeImageIndex - 1 + activeModalProduct.images.length) % activeModalProduct.images.length;
            updateSliderUI();
        }

        function handleSwipe() {
            if (touchEndX < touchStartX - 50) nextImage();
            if (touchEndX > touchStartX + 50) prevImage();
        }

        function closeModal() {
            const modal = document.getElementById('product-modal');
            modal.classList.remove('flex'); modal.classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function closeModalOutside(e) { if (e.target.id === 'product-modal') closeModal(); }

        function updateModalQty(delta) {
            if (!activeModalProduct) return;
            const newQty = modalQty + delta;
            if (newQty >= 1 && (activeModalProduct.stock === -1 || newQty <= activeModalProduct.stock)) {
                modalQty = newQty;
                document.getElementById('modal-qty').textContent = modalQty;
            } else if (activeModalProduct.stock !== -1 && newQty > activeModalProduct.stock) {
                showToast(`Stok hanya tersisa ${activeModalProduct.stock}`, 'alert-circle');
            }
        }

        function addToCartFromModal() {
            if (activeModalProduct && (activeModalProduct.stock > 0 || activeModalProduct.stock === -1)) {
                changeQuantity(activeModalProduct.id, modalQty);
                closeModal();
                if(document.getElementById('cart-content').classList.contains('hidden')) toggleCart();
            }
        }

        function changeQuantity(id, delta) {
            const product = products.find(p => p.id === id);
            if (!product || product.stock === 0) return;
            const itemInCart = cart.find(item => item.id === id);
            
            if (itemInCart) {
                const nextQty = itemInCart.quantity + delta;
                if (product.stock !== -1 && nextQty > product.stock) {
                    showToast(`Batas stok tercapai (${product.stock})`, 'alert-circle');
                    return;
                }
                itemInCart.quantity = nextQty;
                if (itemInCart.quantity <= 0) cart = cart.filter(item => item.id !== id);
            } else if (delta > 0) {
                cart.push({ ...product, quantity: delta });
            }
            updateCartUI();
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items');
            container.innerHTML = '';
            let total = 0; let count = 0;

            if (cart.length === 0) {
                container.innerHTML = `<div class="flex flex-col items-center py-10 opacity-30"><i data-lucide="shopping-cart" class="w-12 h-12 mb-2"></i><p class="text-sm font-medium italic text-center">Keranjang masih kosong</p></div>`;
            } else {
                cart.forEach(item => {
                    total += item.price * item.quantity;
                    count += item.quantity;
                    const el = document.createElement('div');
                    el.className = "flex items-center gap-4 bg-zinc-50 p-4 rounded-2xl border border-zinc-100 cart-item-enter";
                    el.innerHTML = `
                        <img src="${item.images[0]}" class="w-14 h-14 rounded-xl object-cover shadow-sm">
                        <div class="flex-grow min-w-0">
                            <h4 class="text-xs font-bold text-zinc-900 truncate mb-0.5">${item.name}</h4>
                            <p class="text-[10px] text-zinc-400 font-bold uppercase tracking-tight">${formatRupiah(item.price)}</p>
                        </div>
                        <div class="flex items-center gap-2 bg-white px-2 py-1 rounded-full border border-zinc-200">
                            <button onclick="changeQuantity(${item.id}, -1)" class="w-6 h-6 flex items-center justify-center rounded-full hover:bg-zinc-100">
                                <i data-lucide="minus" class="w-3 h-3 text-zinc-500"></i>
                            </button>
                            <span class="text-xs font-black w-4 text-center text-zinc-900">${item.quantity}</span>
                            <button onclick="changeQuantity(${item.id}, 1)" class="w-6 h-6 flex items-center justify-center rounded-full hover:bg-zinc-100">
                                <i data-lucide="plus" class="w-3 h-3 text-zinc-500"></i>
                            </button>
                        </div>`;
                    container.appendChild(el);
                });
            }
            document.getElementById('cart-count').textContent = count;
            document.getElementById('cart-total').textContent = formatRupiah(total);
            lucide.createIcons();
        }

        function toggleCart() { document.getElementById('cart-content').classList.toggle('hidden'); }

        function checkoutWhatsApp() {
            if (cart.length === 0) {
                showToast("Produk Kosong! Tambahkan barang ke keranjang terlebih dahulu.", "shopping-cart");
                return;
            }
            const nomorWA = "6282230547948"; 
            let message = "*DAFTAR PESANAN THREEHEAD.CO*\n--------------------------------------\n\n";
            let totalAll = 0;
            cart.forEach((item, index) => {
                const subTotal = item.price * item.quantity;
                totalAll += subTotal;
                message += `*${index + 1}. ${item.name}*\n   Jumlah: ${item.quantity}x\n   Harga: ${formatRupiah(subTotal)}\n\n`;
            });
            message += "--------------------------------------\n";
            message += `*TOTAL AKHIR: ${formatRupiah(totalAll)}*\n\n_Mohon konfirmasi stok dan pengiriman._`;
            window.open(`https://wa.me/${nomorWA}?text=${encodeURIComponent(message)}`, '_blank');
        }

        window.onload = () => { renderProducts(); lucide.createIcons(); };
    </script>
</body>
</html>
